<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Thám Hiểm Di Sản</title>
    <!-- Nhúng Tailwind CSS để giữ nguyên giao diện đẹp mắt -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Tùy chỉnh hiệu ứng hiển thị */
        .screen { display: none; }
        .screen.active { display: block; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="w-full h-screen bg-[#2c1e16] flex items-center justify-center p-2 m-0 overflow-hidden font-sans">

    <!-- Container chính giữ tỷ lệ 16:9 -->
    <div class="relative w-full max-w-5xl bg-white shadow-2xl overflow-hidden rounded-xl ring-4 ring-amber-900/50" style="aspect-ratio: 16/9;">
        
        <!-- ================= MÀN HÌNH 1: BẮT ĐẦU ================= -->
        <div id="screen-start" class="screen active absolute inset-0 fade-in">
            <img src="https://lh3.googleusercontent.com/d/1WdlihIamNab6kqGlk53XtsgApnjP2_Hi" alt="Bắt đầu" class="absolute inset-0 w-full h-full object-cover select-none pointer-events-none">
            <!-- Nút bấm vô hình -->
            <button onclick="startGame()" class="absolute cursor-pointer rounded-full outline-none hover:bg-white/20 active:bg-black/20 transition-colors duration-200 z-10" style="top: 64%; left: 56.5%; width: 32%; height: 19%;" title="Bắt đầu thử thách"></button>
        </div>

        <!-- ================= MÀN HÌNH 2: BẢN ĐỒ ================= -->
        <div id="screen-map" class="screen absolute inset-0 fade-in">
            <img src="https://lh3.googleusercontent.com/d/1CyrtmZu8T00Dhrgmox4InscwlRT7Iac2" alt="Bản đồ" class="absolute inset-0 w-full h-full object-cover select-none pointer-events-none">
            
            <!-- Vùng chứa các điểm trên bản đồ -->
            <div id="map-nodes-container"></div>

            <!-- Gấu trúc -->
            <div id="panda" class="absolute z-30 transition-all duration-700 ease-in-out pointer-events-none" style="transform: translate(-50%, -80%); top: 83%; left: 13%;">
                <div class="text-4xl sm:text-5xl md:text-6xl animate-bounce drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)]">🐼</div>
            </div>
        </div>

        <!-- ================= MÀN HÌNH 3: CÂU HỎI ================= -->
        <div id="screen-question" class="screen absolute inset-0 fade-in">
            <img src="https://lh3.googleusercontent.com/d/1bnwaFbAxC72yS7p2ToX8eXgQmxDX3B3_" alt="Câu hỏi" class="absolute inset-0 w-full h-full object-cover select-none pointer-events-none">
            
            <!-- Nội dung câu hỏi -->
            <div class="absolute top-[6%] sm:top-[8%] left-[10%] right-[10%] bg-white/95 border-2 sm:border-4 border-amber-900 rounded-lg sm:rounded-xl p-2 sm:p-4 text-center shadow-lg flex flex-col justify-center items-center h-[12%] sm:h-[15%]">
                <p id="question-text" class="text-xs sm:text-base md:text-xl font-bold text-amber-950 px-2 line-clamp-3"></p>
            </div>

            <!-- Vùng chứa 4 đáp án -->
            <div id="answers-container"></div>
        </div>

        <!-- ================= MÀN HÌNH 4: CHIẾN THẮNG ================= -->
        <div id="screen-won" class="screen absolute inset-0 fade-in">
            <img src="https://lh3.googleusercontent.com/d/1CyrtmZu8T00Dhrgmox4InscwlRT7Iac2" alt="Bản đồ" class="absolute inset-0 w-full h-full object-cover select-none pointer-events-none">
            <div class="absolute inset-0 bg-amber-900/60 backdrop-blur-sm flex items-center justify-center">
                <div class="bg-[#fffbeb] p-8 sm:p-12 rounded-3xl shadow-2xl border-4 sm:border-8 border-yellow-500 text-center z-10 w-[80%] max-w-xl transform scale-110 transition-transform duration-500">
                    <div class="text-7xl sm:text-9xl mb-4 animate-bounce drop-shadow-xl">🏆🐼</div>
                    <h1 class="text-3xl sm:text-5xl font-black text-red-600 mb-2 sm:mb-4 uppercase drop-shadow-sm">Chiến thắng!</h1>
                    <p class="text-sm sm:text-xl text-amber-900 font-bold mb-6 sm:mb-8">
                        Tuyệt vời! Bạn đã xuất sắc vượt qua mọi thử thách và trở thành <br/> 
                        <span class="text-red-600 text-lg sm:text-2xl mt-2 inline-block uppercase">"Nhà thám hiểm di sản"</span>
                    </p>
                    <button onclick="restartGame()" class="px-6 py-3 sm:px-8 sm:py-4 bg-gradient-to-b from-green-400 to-green-600 hover:from-green-500 hover:to-green-700 text-white font-bold text-lg sm:text-2xl rounded-full shadow-[0_6px_0_#14532d] active:shadow-[0_0px_0_#14532d] active:translate-y-1 transition-all border-2 border-green-200">
                        Chơi lại từ đầu
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= HỘP THOẠI PHẢN HỒI (ĐÚNG/SAI) ================= -->
        <div id="modal-feedback" class="absolute inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-sm hidden">
            <div id="feedback-card" class="p-6 sm:p-10 rounded-2xl sm:rounded-3xl border-4 sm:border-8 shadow-2xl text-center transform scale-110 transition-transform duration-300">
                <div id="feedback-icon" class="text-5xl sm:text-7xl mb-2 sm:mb-4 animate-bounce"></div>
                <h2 id="feedback-title" class="text-lg sm:text-3xl font-black"></h2>
                <p id="feedback-desc" class="mt-2 text-sm sm:text-lg font-bold"></p>
            </div>
        </div>

    </div>

    <!-- ================= JAVASCRIPT LOGIC ================= -->
    <script>
        // 1. Dữ liệu câu hỏi
        const QUESTIONS = [
            { id: 1, text: "Những bức tượng binh sĩ giống nhau được phát hiện trong công trình nào?", options: ["Vạn Lý Trường Thành", "Lăng mộ Tần Thủy Hoàng", "Cố Cung Bắc Kinh", "Chùa Thiếu Lâm"], correctAnswer: 1 },
            { id: 2, text: "Các tượng binh sĩ trong lăng mộ Tần Thủy Hoàng được làm bằng gì?", options: ["Đá", "Đồng", "Đất nung", "Gỗ"], correctAnswer: 2 },
            { id: 3, text: "Lăng mộ Tần Thủy Hoàng được phát hiện vào năm nào?", options: ["1974", "1954", "2000", "1987"], correctAnswer: 0 },
            { id: 4, text: "Công trình nào được xây dựng để bảo vệ đất nước khỏi sự tấn công từ bên ngoài?", options: ["Lăng mộ Tần Thủy Hoàng", "Cố Cung Bắc Kinh", "Vạn Lý Trường Thành", "Tử Cấm Thành"], correctAnswer: 2 },
            { id: 5, text: "Vạn Lý Trường Thành kéo dài theo hướng nào?", options: ["Bắc – Nam", "Đông – Tây", "Nam – Tây", "Đông – Nam"], correctAnswer: 1 },
            { id: 6, text: "Vạn Lý Trường Thành được UNESCO công nhận là Di sản thế giới vào năm nào?", options: ["1974", "1990", "1987", "2005"], correctAnswer: 2 },
            { id: 7, text: "Cố Cung Bắc Kinh là nơi ở của ai trong thời phong kiến?", options: ["Quan lại", "Các vị vua Trung Quốc", "Các thương nhân", "Các nhà sư"], correctAnswer: 1 },
            { id: 8, text: "Công trình kiến trúc nào được xem là cung điện lớn và nổi tiếng ở Bắc Kinh?", options: ["Lăng mộ Tần Thủy Hoàng", "Cố Cung Bắc Kinh", "Vạn Lý Trường Thành", "Thiên An Môn"], correctAnswer: 1 },
            { id: 9, text: "Ai là người Việt Nam có đóng góp trong việc xây dựng Cố Cung Bắc Kinh?", options: ["Nguyễn Trãi", "Nguyễn Du", "Nguyễn An", "Lê Quý Đôn"], correctAnswer: 2 },
            { id: 10, text: "Những công trình như Vạn Lý Trường Thành, Lăng mộ Tần Thủy Hoàng, Cố Cung Bắc Kinh cho thấy điều gì?", options: ["Trung Quốc có nhiều sông", "Trung Quốc có lịch sử và văn hóa lâu đời", "Trung Quốc có nhiều rừng", "Trung Quốc có nhiều đảo"], correctAnswer: 1 }
        ];

        // 2. Tọa độ bản đồ và khung đáp án
        const MAP_NODES = [
            { id: 1, top: '83%', left: '13%' }, { id: 2, top: '74%', left: '23%' },
            { id: 3, top: '71%', left: '36%' }, { id: 4, top: '80%', left: '48%' },
            { id: 5, top: '85%', left: '61%' }, { id: 6, top: '60%', left: '68.5%' },
            { id: 7, top: '53%', left: '84%' }, { id: 8, top: '35%', left: '80%' },
            { id: 9, top: '22%', left: '76%' }, { id: 10, top: '17%', left: '91%' }
        ];

        const ANSWER_BOXES = [
            { top: '23%', left: '9.5%', width: '38%', height: '32%' },  // A
            { top: '23%', left: '52.5%', width: '38%', height: '32%' }, // B
            { top: '58%', left: '9.5%', width: '38%', height: '32%' },  // C
            { top: '58%', left: '52.5%', width: '38%', height: '32%' }  // D
        ];

        // 3. Quản lý trạng thái Game
        let currentLevel = 1;
        let isAnimating = false;

        // Khởi tạo giao diện lần đầu
        function initGame() {
            createMapNodes();
            createAnswerBoxes();
            updateMapState();
        }

        // Tạo các nút trên bản đồ
        function createMapNodes() {
            const container = document.getElementById('map-nodes-container');
            container.innerHTML = '';
            MAP_NODES.forEach(node => {
                const btn = document.createElement('button');
                btn.id = `map-node-${node.id}`;
                btn.style.top = node.top;
                btn.style.left = node.left;
                btn.style.width = '6%';
                btn.style.height = '10.5%';
                btn.onclick = () => handleNodeClick(node.id);
                container.appendChild(btn);
            });
        }

        // Tạo 4 khung đáp án
        function createAnswerBoxes() {
            const container = document.getElementById('answers-container');
            container.innerHTML = '';
            ANSWER_BOXES.forEach((box, index) => {
                const btn = document.createElement('button');
                btn.style.top = box.top;
                btn.style.left = box.left;
                btn.style.width = box.width;
                btn.style.height = box.height;
                btn.className = "absolute cursor-pointer rounded-lg sm:rounded-xl transition-all duration-200 hover:bg-black/5 active:scale-95 group flex flex-col items-center";
                btn.onclick = () => handleAnswer(index);

                btn.innerHTML = `
                    <div class="w-full h-[65%] flex items-center justify-center p-2 sm:p-4">
                        <span id="answer-text-${index}" class="text-[10px] sm:text-sm md:text-lg font-bold text-amber-900 text-center leading-tight group-hover:text-green-700 transition-colors"></span>
                    </div>
                    <div class="w-[85%] h-[20%] mt-auto mb-[5%] rounded-full group-hover:bg-white/30 transition-colors flex items-center justify-center"></div>
                `;
                container.appendChild(btn);
            });
        }

        // Chuyển đổi màn hình
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Hành động: Bắt đầu trò chơi
        function startGame() {
            switchScreen('screen-map');
            updateMapState();
        }

        // Cập nhật giao diện Bản đồ
        function updateMapState() {
            MAP_NODES.forEach(node => {
                const btn = document.getElementById(`map-node-${node.id}`);
                const isCurrent = node.id === currentLevel;
                const isPassed = node.id < currentLevel;

                let classes = "absolute rounded-full transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center transition-all ";
                if (isCurrent) classes += "cursor-pointer animate-pulse ring-4 ring-white bg-white/30 z-20";
                else if (!isPassed) classes += "cursor-not-allowed";
                
                btn.className = classes;
                btn.disabled = !isCurrent;
                btn.innerHTML = isPassed ? '<div class="w-full h-full rounded-full bg-green-500/40"></div>' : '';
            });

            // Di chuyển gấu trúc
            const panda = document.getElementById('panda');
            const targetNode = MAP_NODES[currentLevel - 1];
            panda.style.top = targetNode.top;
            panda.style.left = targetNode.left;
        }

        // Hành động: Click vào điểm trên bản đồ
        function handleNodeClick(nodeId) {
            if (nodeId === currentLevel) {
                updateQuestionState();
                switchScreen('screen-question');
            }
        }

        // Cập nhật nội dung Câu hỏi
        function updateQuestionState() {
            const question = QUESTIONS[currentLevel - 1];
            document.getElementById('question-text').innerHTML = `<span class="text-amber-700 mr-2">Câu ${question.id}:</span>${question.text}`;
            
            question.options.forEach((opt, index) => {
                document.getElementById(`answer-text-${index}`).innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
            });
        }

        // Hành động: Chọn đáp án
        function handleAnswer(selectedIndex) {
            if (isAnimating) return; // Khóa click liên tục
            isAnimating = true;

            const question = QUESTIONS[currentLevel - 1];
            const isCorrect = selectedIndex === question.correctAnswer;
            
            showFeedback(isCorrect);

            setTimeout(() => {
                hideFeedback();
                if (isCorrect) {
                    if (currentLevel === 10) {
                        switchScreen('screen-won');
                    } else {
                        currentLevel++;
                        updateMapState();
                        switchScreen('screen-map');
                    }
                }
                isAnimating = false;
            }, 2000); // Đợi 2 giây
        }

        // Hiển thị/Ẩn thông báo đúng sai
        function showFeedback(isCorrect) {
            const modal = document.getElementById('modal-feedback');
            const card = document.getElementById('feedback-card');
            
            if (isCorrect) {
                card.className = "p-6 sm:p-10 rounded-2xl sm:rounded-3xl border-4 sm:border-8 shadow-2xl text-center transform scale-110 transition-transform duration-300 bg-[#f0fdf4] border-green-500";
                document.getElementById('feedback-icon').innerText = "🎉";
                document.getElementById('feedback-title').className = "text-lg sm:text-3xl font-black text-green-700";
                document.getElementById('feedback-title').innerText = "CHÚC MỪNG BẠN!";
                document.getElementById('feedback-desc').className = "mt-2 text-sm sm:text-lg font-bold text-green-600";
                document.getElementById('feedback-desc').innerText = "Đáp án hoàn toàn chính xác";
            } else {
                card.className = "p-6 sm:p-10 rounded-2xl sm:rounded-3xl border-4 sm:border-8 shadow-2xl text-center transform scale-110 transition-transform duration-300 bg-[#fef2f2] border-red-500";
                document.getElementById('feedback-icon').innerText = "❌";
                document.getElementById('feedback-title').className = "text-lg sm:text-3xl font-black text-red-700";
                document.getElementById('feedback-title').innerText = "RẤT TIẾC!";
                document.getElementById('feedback-desc').className = "mt-2 text-sm sm:text-lg font-bold text-red-600";
                document.getElementById('feedback-desc').innerText = "Bạn đã chọn sai mất rồi";
            }
            
            modal.classList.remove('hidden');
        }

        function hideFeedback() {
            document.getElementById('modal-feedback').classList.add('hidden');
        }

        // Hành động: Chơi lại từ đầu
        function restartGame() {
            currentLevel = 1;
            switchScreen('screen-start');
            updateMapState();
        }

        // Khởi động script
        initGame();
    </script>
</body>
</html>
