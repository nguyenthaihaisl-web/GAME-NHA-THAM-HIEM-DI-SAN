<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trò Chơi Thám Hiểm Di Sản</title>
    <!-- Nhúng Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Hiệu ứng chuyển cảnh */
        .screen { display: none; opacity: 0; transition: opacity 0.3s ease-in-out; }
        .screen.active { display: block; opacity: 1; }
        
        /* Container Queries & Tính toán kích thước phóng to tối đa */
        .game-board {
            container-type: inline-size;
            aspect-ratio: 16 / 9;
            width: 100%;
            /* Giới hạn chiều rộng dựa trên chiều cao thực tế của trình duyệt để luôn giữ tỷ lệ 16:9 */
            max-width: calc(100dvh * (16 / 9));
            max-height: 100dvh;
        }

        /* Ẩn bớt thanh cuộn trên mobile */
        body { overscroll-behavior-y: contain; margin: 0; padding: 0; }

        /* --- THÊM HIỆU ỨNG ĐÚNG/SAI --- */
        /* Hiệu ứng rung khi sai */
        @keyframes shake {
            0%, 100% { transform: scale(1) translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: scale(1) translateX(-1.5cqi); }
            20%, 40%, 60%, 80% { transform: scale(1) translateX(1.5cqi); }
        }
        .animate-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        
        /* Hiệu ứng hào quang khi đúng */
        @keyframes glow-success {
            0% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4), inset 0 0 20px rgba(34,197,94,0.1); }
            50% { box-shadow: 0 0 50px rgba(34, 197, 94, 0.8), inset 0 0 40px rgba(34,197,94,0.4); }
            100% { box-shadow: 0 0 20px rgba(34, 197, 94, 0.4), inset 0 0 20px rgba(34,197,94,0.1); }
        }
        .animate-glow { animation: glow-success 1s ease-in-out infinite; }
        
        /* Hiệu ứng nền chớp đỏ khi sai */
        @keyframes flash-danger {
            0%, 100% { background-color: rgba(0,0,0,0.6); }
            50% { background-color: rgba(220, 38, 38, 0.5); }
        }
        .bg-flash-danger { animation: flash-danger 0.5s ease-in-out; }
    </style>
</head>
<body class="w-full h-[100dvh] bg-[#2c1e16] flex items-center justify-center overflow-hidden font-sans">

    <!-- Container chính giữ tỷ lệ 16:9 và tự động co giãn hết cỡ -->
    <div class="game-board relative bg-black shadow-2xl overflow-hidden">
        
        <!-- Nút Bật/Tắt Âm thanh -->
        <button id="btn-mute" onclick="toggleMute()" class="absolute top-[3%] right-[2%] z-50 bg-white/90 p-[1.5cqi] rounded-full shadow-lg hover:bg-white transition-colors flex items-center justify-center aspect-square border-2 border-amber-900/20 hover:scale-105 active:scale-95" title="Bật/Tắt âm thanh">
            <span id="mute-icon" class="leading-none drop-shadow-sm" style="font-size: 3cqi;">🔊</span>
        </button>

        <!-- Hiển thị thời gian -->
        <div id="timer-display" class="absolute top-[3%] left-[2%] z-50 bg-white/90 px-[2cqi] py-[1cqi] rounded-full shadow-lg border-2 border-amber-900/20 font-bold text-amber-950 flex items-center justify-center transition-opacity hidden" style="font-size: 2cqi;">
            ⏱️ <span id="time-text" class="ml-[1cqi]">00:00</span>
        </div>

        <!-- ================= MÀN HÌNH 1: BẮT ĐẦU ================= -->
        <div id="screen-start" class="screen active absolute inset-0">
            <img src="https://lh3.googleusercontent.com/d/1WdlihIamNab6kqGlk53XtsgApnjP2_Hi" alt="Bắt đầu" class="absolute inset-0 w-full h-full object-cover select-none pointer-events-none">
            
            <!-- Nút bấm vô hình (khớp với ảnh) -->
            <button onclick="startGame()" class="absolute cursor-pointer rounded-full outline-none hover:bg-white/20 active:bg-black/30 transition-colors duration-200 z-10" style="top: 64%; left: 56.5%; width: 32%; height: 19%;" title="Bắt đầu thử thách"></button>
            
            <!-- Ô nhập tên nhà thám hiểm (Góc trên bên trái, đẩy lên cao hơn) -->
            <div class="absolute top-[2%] left-[8%] z-20 w-[32%]">
                <input type="text" id="player-name" placeholder="Vui lòng nhập tên nhà thám hiểm..." maxlength="25" onkeypress="if(event.key === 'Enter') startGame()" class="w-full bg-white/95 border-2 md:border-4 border-amber-900 rounded-full px-[2cqi] py-[1.2cqi] text-center font-bold text-amber-950 shadow-lg outline-none focus:ring-4 focus:ring-amber-500/50 transition-all" style="font-size: 1.5cqi;">
            </div>

            <!-- Nút xem Bảng xếp hạng (Thấp xuống sát cạnh dưới) -->
            <button onclick="showLeaderboard()" class="absolute bottom-[2%] left-[5%] bg-amber-700/90 hover:bg-amber-600 text-white font-bold rounded-full shadow-lg border-2 border-amber-300 transition-all z-20" style="font-size: 1.8cqi; padding: 1.2cqi 2.5cqi;">
                🏆 Bảng xếp hạng
            </button>
        </div>

        <!-- ================= MÀN HÌNH 2: BẢN ĐỒ ================= -->
        <div id="screen-map" class="screen absolute inset-0">
            <img src="https://lh3.googleusercontent.com/d/1CyrtmZu8T00Dhrgmox4InscwlRT7Iac2" alt="Bản đồ" class="absolute inset-0 w-full h-full object-cover select-none pointer-events-none">
            
            <div id="map-nodes-container"></div>

            <div id="panda" class="absolute z-30 transition-all duration-700 ease-in-out pointer-events-none" style="transform: translate(-50%, -80%); top: 83%; left: 13%;">
                <!-- Font size tự co giãn theo cqi -->
                <div class="animate-bounce drop-shadow-[0_10px_10px_rgba(0,0,0,0.5)]" style="font-size: 6cqi;">🐼</div>
            </div>
        </div>

        <!-- ================= MÀN HÌNH 3: CÂU HỎI ================= -->
        <div id="screen-question" class="screen absolute inset-0">
            <img src="https://lh3.googleusercontent.com/d/1bnwaFbAxC72yS7p2ToX8eXgQmxDX3B3_" alt="Câu hỏi" class="absolute inset-0 w-full h-full object-cover select-none pointer-events-none">
            
            <!-- Khung chứa Nội dung câu hỏi: Căn giữa tuyệt đối -->
            <div class="absolute bg-white/95 border-2 md:border-4 border-amber-900 rounded-lg shadow-lg flex flex-col justify-center items-center px-[3%]" style="top: 7%; left: 10%; width: 80%; height: 13%;">
                <!-- Font size dùng cqi đảm bảo không bao giờ tràn -->
                <p id="question-text" class="font-bold text-amber-950 text-center w-full leading-tight" style="font-size: 2.2cqi;"></p>
            </div>

            <!-- Vùng chứa 4 đáp án -->
            <div id="answers-container"></div>
        </div>

        <!-- ================= MÀN HÌNH 4: CHIẾN THẮNG ================= -->
        <div id="screen-won" class="screen absolute inset-0">
            <img src="https://lh3.googleusercontent.com/d/1CyrtmZu8T00Dhrgmox4InscwlRT7Iac2" alt="Bản đồ" class="absolute inset-0 w-full h-full object-cover select-none pointer-events-none">
            <div class="absolute inset-0 bg-amber-900/60 backdrop-blur-sm flex items-center justify-center">
                <div class="bg-[#fffbeb] p-[4cqi] rounded-3xl shadow-2xl border-4 md:border-8 border-yellow-500 text-center z-10 w-[80%] max-w-xl flex flex-col items-center">
                    <div class="animate-bounce drop-shadow-xl mb-[2cqi]" style="font-size: 10cqi;">🏆🐼</div>
                    <h1 class="font-black text-red-600 uppercase drop-shadow-sm mb-[1cqi]" style="font-size: 5cqi;">Chiến thắng!</h1>
                    <p class="text-amber-900 font-bold mb-[1cqi] leading-snug" style="font-size: 2.2cqi;">
                        Tuyệt vời <span id="won-player-name" class="text-red-600 text-[2.8cqi] uppercase ml-[0.5cqi]"></span>! <br/>
                        Bạn đã trở thành "Nhà thám hiểm di sản" trong:<br/>
                        <span id="won-time" class="text-green-700 font-mono text-[3.5cqi] block mt-[1cqi]">00:00</span>
                    </p>
                    <div class="flex gap-[2cqi] mt-[2cqi] w-full justify-center">
                        <button onclick="restartGame()" class="flex-1 bg-gradient-to-b from-green-400 to-green-600 hover:from-green-500 hover:to-green-700 text-white font-bold rounded-full shadow-[0_4px_0_#14532d] active:shadow-[0_0px_0_#14532d] active:translate-y-1 transition-all border-2 border-green-200" style="font-size: 2cqi; padding: 1.5cqi 2cqi;">
                            Chơi lại
                        </button>
                        <button onclick="showLeaderboard()" class="flex-1 bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-600 hover:to-amber-800 text-white font-bold rounded-full shadow-[0_4px_0_#78350f] active:shadow-[0_0px_0_#78350f] active:translate-y-1 transition-all border-2 border-amber-200" style="font-size: 2cqi; padding: 1.5cqi 2cqi;">
                            Bảng xếp hạng
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ================= MÀN HÌNH 5: BẢNG XẾP HẠNG ================= -->
        <div id="screen-leaderboard" class="screen absolute inset-0 z-40">
            <img src="https://lh3.googleusercontent.com/d/1CyrtmZu8T00Dhrgmox4InscwlRT7Iac2" alt="Bản đồ" class="absolute inset-0 w-full h-full object-cover select-none pointer-events-none blur-sm">
            <div class="absolute inset-0 bg-black/60 flex items-center justify-center p-[4cqi]">
                <div class="bg-[#fffbeb] w-full max-w-2xl rounded-3xl p-[4cqi] border-4 md:border-8 border-amber-600 shadow-2xl flex flex-col h-[85%] relative">
                    <h2 class="text-center font-black text-amber-900 mb-[2cqi] uppercase drop-shadow-sm" style="font-size: 4cqi;">🏆 Bảng Xếp Hạng</h2>
                    <div class="bg-amber-100/80 rounded-xl p-[1cqi] flex-1 overflow-y-auto mb-[3cqi] border-2 border-amber-300">
                        <table class="w-full text-left border-collapse" style="font-size: 2.2cqi;">
                            <thead class="sticky top-0 bg-amber-200 shadow-sm z-10 rounded-t-lg">
                                <tr class="text-amber-900">
                                    <th class="py-[1.5cqi] px-[2cqi] rounded-tl-lg text-center">Hạng</th>
                                    <th class="py-[1.5cqi] px-[2cqi]">Nhà Thám Hiểm</th>
                                    <th class="py-[1.5cqi] px-[2cqi] text-right rounded-tr-lg">Thời gian</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-body" class="text-amber-950 font-bold">
                                <!-- Dữ liệu BXH sẽ chèn vào đây -->
                            </tbody>
                        </table>
                    </div>
                    <button onclick="closeLeaderboard()" class="self-center bg-amber-700 hover:bg-amber-800 text-white font-bold rounded-full px-[5cqi] py-[1.5cqi] shadow-[0_4px_0_#78350f] active:shadow-[0_0px_0_#78350f] active:translate-y-1 transition-all border-2 border-amber-300" style="font-size: 2.2cqi;">
                        Đóng
                    </button>
                </div>
            </div>
        </div>

        <!-- ================= HỘP THOẠI CẢNH BÁO ================= -->
        <div id="modal-alert" class="absolute inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none">
            <div id="alert-card" class="bg-[#fffbeb] p-[4cqi] rounded-3xl border-4 md:border-8 border-amber-500 shadow-2xl text-center transform scale-90 transition-transform duration-300 min-w-[50%] max-w-md">
                <div class="text-amber-500 mb-[1cqi] animate-bounce" style="font-size: 6cqi;">⚠️</div>
                <h2 class="font-black text-amber-900" style="font-size: 3.5cqi;">Thông báo</h2>
                <p id="alert-desc" class="font-bold mt-[2cqi] text-amber-800" style="font-size: 2.2cqi;"></p>
                <button onclick="closeAlert()" class="mt-[3cqi] bg-amber-500 hover:bg-amber-600 text-white font-bold rounded-full px-[4cqi] py-[1.5cqi] shadow-[0_4px_0_#b45309] active:shadow-[0_0px_0_#b45309] active:translate-y-1 transition-all" style="font-size: 2.2cqi;">Đã hiểu</button>
            </div>
        </div>

        <!-- ================= HỘP THOẠI PHẢN HỒI (ĐÚNG/SAI) ================= -->
        <div id="modal-feedback" class="absolute inset-0 bg-black/60 z-50 flex items-center justify-center backdrop-blur-sm transition-opacity duration-300 opacity-0 pointer-events-none">
            <div id="feedback-card" class="p-[4cqi] rounded-3xl border-4 md:border-8 shadow-2xl text-center transform scale-90 transition-transform duration-300 flex flex-col items-center">
                <!-- Thêm thẻ img để hiển thị ảnh động/biểu tượng -->
                <img id="feedback-image" src="" alt="Trạng thái" class="w-[12cqi] h-[12cqi] object-contain mb-[1cqi] drop-shadow-xl hidden">
                <div id="feedback-icon" class="animate-bounce mb-[1cqi] hidden" style="font-size: 8cqi;"></div>
                <h2 id="feedback-title" class="font-black" style="font-size: 3.5cqi;"></h2>
                <p id="feedback-desc" class="font-bold mt-[1cqi]" style="font-size: 2.2cqi;"></p>
            </div>
        </div>

    </div>

    <!-- ================= JAVASCRIPT LOGIC ================= -->
    <script>
        const QUESTIONS = [
            { id: 1, text: "Những bức tượng binh sĩ giống nhau được phát hiện trong công trình nào?", options: ["Vạn Lý Trường Thành", "Lăng mộ Tần Thủy Hoàng", "Cố Cung Bắc Kinh", "Chùa Thiếu Lâm"], correctAnswer: 1 },
            { id: 2, text: "Các tượng binh sĩ trong lăng mộ Tần Thủy Hoàng được làm bằng gì?", options: ["Đá", "Đồng", "Đất nung", "Gỗ"], correctAnswer: 2 },
            { id: 3, text: "Lăng mộ Tần Thủy Hoàng được phát hiện vào năm nào?", options: ["1974", "1954", "2000", "1987"], correctAnswer: 0 },
            { id: 4, text: "Công trình nào được xây dựng để bảo vệ đất nước khỏi sự tấn công từ bên ngoài?", options: ["Lăng mộ Tần Thủy Hoàng", "Cố Cung Bắc Kinh", "Vạn Lý Trường Thành", "Tử Cấm Thành"], correctAnswer: 2 },
            { id: 5, text: "Vạn Lý Trường Thành kéo dài theo hướng nào?", options: ["Bắc – Nam", "Đông – Tây", "Nam – Tây", "Đông – Nam"], correctAnswer: 1 },
            { id: 6, text: "Vạn Lý Trường Thành được UNESCO công nhận là Di sản thế giới vào năm nào?", options: ["1974", "1990", "1987", "2005"], correctAnswer: 2 },
            { id: 7, text: "Cố Cung Bắc Kinh là nơi ở của ai trong thời phong kiến?", options: ["Quan lại", "Các vị vua Trung Quốc", "Các thương nhân", "Các nhà sư"], correctAnswer: 1 },
            { id: 8, text: "Công trình kiến trúc nào được xem là cung điện lớn và nổi tiếng ở Bắc Kinh?", options: ["Lăng mộ Tần Thủy Hoàng", "Cố Cung Bắc Kinh", "Vạn Lý Trường Thành", "Thiên An Môn"], correctAnswer: 1 },
            { id: 9, text: "Ai là người Việt Nam có đóng góp trong việc xây dựng Cố Cung Bắc Kinh?", options: ["Nguyễn Trãi", "Nguyễn Du", "Nguyễn An", "Lê Quý Đôn"], correctAnswer: 2 },
            { id: 10, text: "Những công trình như Vạn Lý Trường Thành, Lăng mộ Tần Thủy Hoàng, Cố Cung Bắc Kinh cho thấy điều gì?", options: ["Trung Quốc có nhiều sông", "Trung Quốc có lịch sử và văn hóa lâu đời", "Trung Quốc có nhiều rừng", "Trung Quốc có nhiều đảo"], correctAnswer: 1 }
        ];

        const MAP_NODES = [
            { id: 1, top: '83%', left: '13%' }, { id: 2, top: '74%', left: '23%' },
            { id: 3, top: '71%', left: '36%' }, { id: 4, top: '80%', left: '48%' },
            { id: 5, top: '85%', left: '61%' }, { id: 6, top: '60%', left: '68.5%' },
            { id: 7, top: '53%', left: '84%' }, { id: 8, top: '35%', left: '80%' },
            { id: 9, top: '22%', left: '76%' }, { id: 10, top: '17%', left: '91%' }
        ];

        // Tọa độ 4 khung đáp án đã tinh chỉnh chính xác với ảnh 3.jpg
        const ANSWER_BOXES = [
            { top: '22%', left: '9%', width: '39%', height: '33%' },  // A
            { top: '22%', left: '52%', width: '39%', height: '33%' }, // B
            { top: '58%', left: '9%', width: '39%', height: '33%' },  // C
            { top: '58%', left: '52%', width: '39%', height: '33%' }  // D
        ];

        // --- KHỞI TẠO HỆ THỐNG ÂM THANH (GIẢI PHÁP TRIỆT ĐỂ 100%) ---
        // Đổi sang nguồn nhạc nền phiêu lưu từ Pixabay (tương thích cực tốt với mọi trình duyệt)
        const audioBGM = new Audio('https://cdn.pixabay.com/audio/2022/05/27/audio_1808fbf07a.mp3');
        audioBGM.loop = true;
        audioBGM.volume = 0.3; // Âm lượng vừa phải
        audioBGM.preload = 'auto'; // Tải sẵn nhạc

        let isMuted = false;
        let isAudioUnlocked = false;

        // MẸO MỞ KHÓA ÂM THANH TRÊN MỌI THIẾT BỊ:
        // Lợi dụng cú chạm/click ĐẦU TIÊN của người chơi (ví dụ: khi nhấn vào ô nhập tên) để mở khóa quyền phát âm thanh
        function unlockAudio() {
            if (!isAudioUnlocked && !isMuted) {
                // Phát rồi dừng ngay lập tức để lấy quyền mà người chơi không nhận ra
                audioBGM.play().then(() => {
                    audioBGM.pause();
                    isAudioUnlocked = true;
                }).catch(err => console.log("Đang chờ tương tác để mở khóa nhạc..."));
                
                initSynth(); // Mở khóa luôn bộ âm thanh hiệu ứng Ting/Bíp
            }
            // Gỡ bỏ sự kiện sau khi đã thử mở khóa để tối ưu hiệu suất
            document.removeEventListener('click', unlockAudio);
            document.removeEventListener('touchstart', unlockAudio);
        }
        
        // Lắng nghe mọi cú chạm đầu tiên trên toàn màn hình
        document.addEventListener('click', unlockAudio);
        document.addEventListener('touchstart', unlockAudio);

        // Bộ tổng hợp âm thanh (Synthesizer) tự tạo tiếng ĐÚNG/SAI mà không cần tải file!
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initSynth() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playCorrectSound() {
            if(isMuted) return; initSynth();
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sine'; // Tiếng Ting trong vắt
            osc.frequency.setValueAtTime(659.25, t); 
            osc.frequency.setValueAtTime(880, t + 0.1); 
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.5, t + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }

        function playWrongSound() {
            if(isMuted) return; initSynth();
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'sawtooth'; // Tiếng Bíp cảnh báo
            osc.frequency.setValueAtTime(250, t);
            osc.frequency.exponentialRampToValueAtTime(150, t + 0.3);
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(0.5, t + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
            osc.start(t); osc.stop(t + 0.4);
        }

        function playWinSound() {
            if(isMuted) return; initSynth();
            const t = audioCtx.currentTime;
            const notes = [
                {f: 523.25, d: 0.15}, {f: 659.25, d: 0.15}, 
                {f: 783.99, d: 0.15}, {f: 1046.50, d: 0.4}
            ]; // Chuỗi giai điệu chiến thắng (Tèn ten ten tén)
            let startTime = t;
            notes.forEach(n => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.type = 'square'; // Tiếng máy chơi game cổ điển
                osc.frequency.value = n.f;
                gain.gain.setValueAtTime(0, startTime);
                gain.gain.linearRampToValueAtTime(0.2, startTime + 0.02);
                gain.gain.exponentialRampToValueAtTime(0.01, startTime + n.d);
                osc.start(startTime);
                osc.stop(startTime + n.d);
                startTime += n.d;
            });
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('mute-icon').innerText = isMuted ? '🔇' : '🔊';
            
            if (isMuted) {
                audioBGM.pause();
            } else {
                // Chỉ phát lại nhạc nền nếu đang chơi
                if (document.getElementById('screen-map').classList.contains('active') || 
                    document.getElementById('screen-question').classList.contains('active') ||
                    document.getElementById('screen-won').classList.contains('active')) {
                    audioBGM.play().catch(e => console.log(e));
                }
            }
        }
        // ----------------------------------

        let currentLevel = 1;
        let isAnimating = false;

        // --- THÊM BIẾN CHO TÊN VÀ THỜI GIAN ---
        let playerName = "";
        let totalSeconds = 0;
        let timerInterval = null;
        let leaderboard = [];
        let previousScreen = 'screen-start';

        // --- LOGIC THỜI GIAN & CẢNH BÁO ---
        function formatTime(sec) {
            const m = Math.floor(sec / 60).toString().padStart(2, '0');
            const s = (sec % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        }

        function startTimer() {
            clearInterval(timerInterval);
            totalSeconds = 0;
            document.getElementById('time-text').innerText = formatTime(totalSeconds);
            document.getElementById('timer-display').classList.remove('hidden');
            
            timerInterval = setInterval(() => {
                totalSeconds++;
                document.getElementById('time-text').innerText = formatTime(totalSeconds);
            }, 1000);
        }

        function stopTimer() {
            clearInterval(timerInterval);
        }

        function showAlert(msg) {
            document.getElementById('alert-desc').innerText = msg;
            document.getElementById('modal-alert').classList.remove('opacity-0', 'pointer-events-none');
            document.getElementById('alert-card').classList.remove('scale-90');
            document.getElementById('alert-card').classList.add('scale-100');
        }

        function closeAlert() {
            document.getElementById('modal-alert').classList.add('opacity-0', 'pointer-events-none');
            document.getElementById('alert-card').classList.remove('scale-100');
            document.getElementById('alert-card').classList.add('scale-90');
        }

        // --- LOGIC BẢNG XẾP HẠNG ---
        function showLeaderboard() {
            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';
            
            if (leaderboard.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" class="text-center py-[4cqi] text-amber-700/70">Chưa có dữ liệu. Hãy là người đầu tiên!</td></tr>`;
            } else {
                leaderboard.forEach((entry, index) => {
                    let rankIcon = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `<span class="px-[1cqi]">${index + 1}</span>`;
                    let highlightClass = entry.name === playerName && entry.time === totalSeconds ? 'bg-green-100/80 font-black' : 'hover:bg-amber-200/50';
                    tbody.innerHTML += `
                        <tr class="border-b border-amber-300/50 transition-colors ${highlightClass}">
                            <td class="py-[1.5cqi] px-[2cqi] text-center">${rankIcon}</td>
                            <td class="py-[1.5cqi] px-[2cqi] truncate max-w-[150px]">${entry.name}</td>
                            <td class="py-[1.5cqi] px-[2cqi] text-right font-mono text-amber-700">${formatTime(entry.time)}</td>
                        </tr>
                    `;
                });
            }
            switchScreen('screen-leaderboard');
        }

        function closeLeaderboard() {
            switchScreen(previousScreen);
        }

        function initGame() {
            createMapNodes();
            createAnswerBoxes();
            updateMapState();
        }

        function createMapNodes() {
            const container = document.getElementById('map-nodes-container');
            container.innerHTML = '';
            MAP_NODES.forEach(node => {
                const btn = document.createElement('button');
                btn.id = `map-node-${node.id}`;
                btn.style.top = node.top;
                btn.style.left = node.left;
                btn.style.width = '6%';
                btn.style.height = '10.5%';
                btn.onclick = () => handleNodeClick(node.id);
                container.appendChild(btn);
            });
        }

        function createAnswerBoxes() {
            const container = document.getElementById('answers-container');
            container.innerHTML = '';
            ANSWER_BOXES.forEach((box, index) => {
                const btn = document.createElement('button');
                btn.style.top = box.top;
                btn.style.left = box.left;
                btn.style.width = box.width;
                btn.style.height = box.height;
                btn.className = "absolute cursor-pointer rounded-xl transition-transform duration-100 hover:scale-[1.02] active:scale-95 group outline-none";
                btn.onclick = () => handleAnswer(index);

                // Khung chữ chiếm phần trên (phần giấy)
                // Khung Hover chiếm phần nút xanh phía dưới
                btn.innerHTML = `
                    <div class="absolute top-0 left-0 w-full h-[70%] flex items-center justify-center px-[6%]">
                        <span id="answer-text-${index}" class="font-bold text-amber-950 text-center transition-colors group-hover:text-green-700 w-full leading-tight" style="font-size: 1.8cqi;"></span>
                    </div>
                    <div class="absolute bottom-[4%] left-[6%] right-[6%] h-[24%] rounded-full group-hover:bg-white/20 transition-colors"></div>
                `;
                container.appendChild(btn);
            });
        }

        function switchScreen(screenId) {
            if (screenId !== 'screen-leaderboard') {
                previousScreen = screenId;
            }
            document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
            setTimeout(() => {
                document.getElementById(screenId).classList.add('active');
            }, 50);
        }

        function startGame() {
            const nameInput = document.getElementById('player-name').value.trim();
            if (!nameInput) {
                showAlert("Vui lòng nhập tên nhà thám hiểm trước khi bắt đầu hành trình!");
                return;
            }
            playerName = nameInput;

            switchScreen('screen-map');
            updateMapState();
            startTimer();
            
            // Bật nhạc nền (Lúc này trình duyệt đã cấp quyền từ cú chạm khi nhập tên)
            if (!isMuted) {
                initSynth(); 
                audioBGM.play().catch(error => {
                    console.log("Không thể phát nhạc nền:", error);
                });
            }
        }

        function updateMapState() {
            MAP_NODES.forEach(node => {
                const btn = document.getElementById(`map-node-${node.id}`);
                const isCurrent = node.id === currentLevel;
                const isPassed = node.id < currentLevel;

                let classes = "absolute rounded-full transform -translate-x-1/2 -translate-y-1/2 flex items-center justify-center transition-all ";
                if (isCurrent) classes += "cursor-pointer animate-pulse ring-4 ring-white bg-white/30 z-20 hover:bg-white/50";
                else if (!isPassed) classes += "cursor-not-allowed";
                
                btn.className = classes;
                btn.disabled = !isCurrent;
                btn.innerHTML = isPassed ? '<div class="w-full h-full rounded-full bg-green-500/50"></div>' : '';
            });

            const panda = document.getElementById('panda');
            const targetNode = MAP_NODES[currentLevel - 1];
            panda.style.top = targetNode.top;
            panda.style.left = targetNode.left;
        }

        function handleNodeClick(nodeId) {
            if (nodeId === currentLevel) {
                updateQuestionState();
                switchScreen('screen-question');
            }
        }

        function updateQuestionState() {
            const question = QUESTIONS[currentLevel - 1];
            document.getElementById('question-text').innerHTML = `<span class="text-amber-700 mr-[1cqi]">Câu ${question.id}:</span>${question.text}`;
            
            question.options.forEach((opt, index) => {
                document.getElementById(`answer-text-${index}`).innerText = `${String.fromCharCode(65 + index)}. ${opt}`;
            });
        }

        function handleAnswer(selectedIndex) {
            if (isAnimating) return;
            isAnimating = true;

            const question = QUESTIONS[currentLevel - 1];
            const isCorrect = selectedIndex === question.correctAnswer;
            const isFinalWin = isCorrect && currentLevel === 10;
            
            // Gọi hàm hiển thị feedback và CÙNG LÚC phát âm thanh ngay lập tức
            // (Không để trong setTimeout để tránh bị Safari chặn âm thanh)
            showFeedback(isCorrect, isFinalWin);

            setTimeout(() => {
                hideFeedback();
                setTimeout(() => {
                    if (isCorrect) {
                        if (isFinalWin) {
                            stopTimer();
                            document.getElementById('timer-display').classList.add('hidden');
                            
                            // Lưu vào bảng xếp hạng
                            leaderboard.push({ name: playerName, time: totalSeconds });
                            leaderboard.sort((a, b) => a.time - b.time); // Thời gian ít nhất lên đầu
                            
                            // Cập nhật giao diện chiến thắng
                            document.getElementById('won-player-name').innerText = playerName;
                            document.getElementById('won-time').innerText = "⏳ " + formatTime(totalSeconds);
                            
                            switchScreen('screen-won');
                            // Âm thanh chiến thắng đã được phát ở showFeedback() để không bị lỗi chặn
                        } else {
                            currentLevel++;
                            updateMapState();
                            switchScreen('screen-map');
                        }
                    } else {
                        // Trả lời sai thì quay lại bản đồ chơi lại ô đó
                        switchScreen('screen-map');
                    }
                    isAnimating = false;
                }, 300);
            }, 2000); 
        }

        function showFeedback(isCorrect, isFinalWin) {
            const modal = document.getElementById('modal-feedback');
            const card = document.getElementById('feedback-card');
            const img = document.getElementById('feedback-image');
            
            // Đặt lại các hiệu ứng cũ trước khi chạy mới
            modal.classList.remove('opacity-0', 'pointer-events-none', 'bg-flash-danger');
            card.classList.remove('scale-90', 'animate-shake', 'animate-glow');
            card.classList.add('scale-100');
            img.classList.remove('hidden');

            if (isCorrect) {
                // KIỂM TRA: NẾU LÀ CÂU CUỐI CÙNG THÌ PHÁT NHẠC CHIẾN THẮNG LUÔN
                if (isFinalWin) {
                    playWinSound();
                } else {
                    playCorrectSound(); // Phát tiếng ĐÚNG (Synth)
                }
                
                card.className = "p-[4cqi] rounded-3xl border-4 md:border-8 shadow-2xl text-center transform transition-transform duration-300 scale-100 bg-[#f0fdf4] border-green-500 animate-glow flex flex-col items-center";
                
                // Nguồn ảnh cho đáp án ĐÚNG (mặt tiệc tùng)
                img.src = "https://fonts.gstatic.com/s/e/notoemoji/latest/1f973/512.webp"; 
                img.classList.add('animate-bounce'); // Cho ảnh nhún nhảy
                
                document.getElementById('feedback-title').className = "font-black text-green-700";
                document.getElementById('feedback-title').innerText = "CHÚC MỪNG BẠN!";
                document.getElementById('feedback-desc').className = "font-bold mt-[1cqi] text-green-600";
                document.getElementById('feedback-desc').innerText = "Đáp án hoàn toàn chính xác";
            } else {
                playWrongSound(); // Phát tiếng SAI (Synth)
                modal.classList.add('bg-flash-danger'); // Chớp nền đỏ
                card.className = "p-[4cqi] rounded-3xl border-4 md:border-8 shadow-2xl text-center transform transition-transform duration-300 scale-100 bg-[#fef2f2] border-red-500 animate-shake flex flex-col items-center";
                
                // Nguồn ảnh cho đáp án SAI (mặt buồn bã)
                img.src = "https://fonts.gstatic.com/s/e/notoemoji/latest/1f61e/512.webp";
                img.classList.remove('animate-bounce'); // Sai thì không nhún nhảy
                
                document.getElementById('feedback-title').className = "font-black text-red-700";
                document.getElementById('feedback-title').innerText = "RẤT TIẾC!";
                document.getElementById('feedback-desc').className = "font-bold mt-[1cqi] text-red-600";
                document.getElementById('feedback-desc').innerText = "Bạn đã chọn sai mất rồi";
            }
        }

        function hideFeedback() {
            const modal = document.getElementById('modal-feedback');
            const card = document.getElementById('feedback-card');
            
            modal.classList.add('opacity-0', 'pointer-events-none');
            card.classList.remove('scale-100');
            card.classList.add('scale-90');
            
            // Gỡ bỏ class hiệu ứng sau khi ẩn để lần sau chạy lại mượt mà
            setTimeout(() => {
                modal.classList.remove('bg-flash-danger');
                card.classList.remove('animate-shake', 'animate-glow');
            }, 300);
        }

        function restartGame() {
            currentLevel = 1;
            stopTimer();
            document.getElementById('timer-display').classList.add('hidden');
            document.getElementById('player-name').value = ''; // Xoá tên để nhập lại nếu muốn
            switchScreen('screen-start');
            updateMapState();
        }

        initGame();
    </script>
</body>
</html>
